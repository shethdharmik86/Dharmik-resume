<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Resume</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- Cinematic background layers -->
    <div class="bg">
      <div class="bg__grain"></div>
      <div class="bg__vignette"></div>
      <div class="bg__scanlines"></div>
    </div>

    <header class="hero">
      <div class="hero__content">
        <p class="eyebrow" id="role"></p>
        <h1 id="name">Your Name</h1>
        <p class="summary" id="summary"></p>
        <div class="cta" id="contact"></div>
      </div>
      <div class="hero__card" id="quick"></div>
    </header>

    <main class="container">
      <section class="section" id="skillsSection">
        <h2>Technical Skills</h2>
        <div class="skill-groups" id="skillGroups"></div>
        <div class="chips" id="skills"></div>
      </section>

      <section class="section" id="softSkillsSection">
        <h2>Soft Skills</h2>
        <div class="chips" id="softSkills"></div>
      </section>

      <section class="section" id="languagesSection">
        <h2>Languages</h2>
        <div class="chips" id="languages"></div>
      </section>

      <section class="section" id="experienceSection">
        <h2>Experience</h2>
        <div class="timeline" id="experience"></div>
      </section>

      <section class="section" id="projectsSection">
        <h2>Projects</h2>
        <div class="grid" id="projects"></div>
      </section>

      <section class="section" id="educationSection">
        <h2>Education</h2>
        <div class="list" id="education"></div>
      </section>

      <section class="section" id="personalSection">
        <h2>Personal Details</h2>
        <div class="list" id="personal"></div>
      </section>

      <section class="section" id="certsSection">
        <h2>Certifications & Awards</h2>
        <div class="list" id="certs"></div>
      </section>
    </main>

    <footer class="footer" id="footer"></footer>

    <script src="app.js"></script>
  </body>
</html>
